<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papi's Story Library</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #FDF6EC;
      --warm: #F5EAD8;
      --paper: #FEFBF5;
      --brown: #6B3F1F;
      --brown-mid: #9A5C30;
      --brown-light: #C4885A;
      --accent: #D4820A;
      --accent-light: #FDE9B8;
      --text: #2C1A0E;
      --muted: #8B6A52;
      --border: #E2CEBC;
      --card: #FFFFFF;
      --shadow: rgba(107, 63, 31, 0.12);
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Hero ── */
    .hero {
      background: var(--brown);
      padding: 2.5rem 1.5rem 2.2rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 24px,
        rgba(255,255,255,0.025) 24px, rgba(255,255,255,0.025) 48px
      );
    }
    .hero-emoji { font-size: 3rem; display: block; margin-bottom: .5rem; position: relative; }
    .hero h1 {
      font-family: 'Lora', serif;
      font-size: 2rem;
      font-weight: 600;
      color: #FDE9B8;
      line-height: 1.2;
      position: relative;
    }
    .hero p {
      font-family: 'Lora', serif;
      font-style: italic;
      color: rgba(253,233,184,0.75);
      font-size: .95rem;
      margin-top: .45rem;
      position: relative;
    }

    /* ── Layout ── */
    .container { max-width: 680px; margin: 0 auto; padding: 1.8rem 1rem 4rem; }

    /* ── Now playing bar ── */
    .now-playing {
      display: none;
      flex-direction: column;
      gap: .6rem;
      background: var(--accent-light);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: .9rem 1rem;
      margin-bottom: 1.4rem;
      animation: fadeIn .3s ease;
    }
    .now-playing.visible { display: flex; }
    .np-top { display: flex; align-items: center; gap: .75rem; }
    .np-cover {
      width: 48px; height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow: 0 2px 6px var(--shadow);
    }
    .np-cover-placeholder {
      width: 48px; height: 48px;
      border-radius: 8px;
      background: var(--warm);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; flex-shrink: 0;
    }
    .np-info { flex: 1; min-width: 0; }
    .np-label { font-size: .7rem; font-weight: 800; text-transform: uppercase; letter-spacing: .06em; color: var(--brown-light); margin-bottom: .15rem; }
    .np-title { font-family: 'Lora', serif; font-size: .95rem; font-weight: 600; color: var(--brown); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .np-audio { width: 100%; accent-color: var(--brown); height: 36px; }

    /* ── Book grid ── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }

    .book-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 3px 10px var(--shadow);
      cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      animation: fadeIn .4s ease both;
    }
    .book-card:hover { transform: translateY(-4px); box-shadow: 0 8px 20px var(--shadow); }
    .book-card.playing { outline: 3px solid var(--accent); outline-offset: 2px; }

    .book-cover-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      background: var(--warm);
      position: relative;
    }
    .book-cover-wrap img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }
    .book-card:hover .book-cover-wrap img { transform: scale(1.04); }

    .play-overlay {
      position: absolute;
      inset: 0;
      background: rgba(107,63,31,0.45);
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity .2s;
    }
    .book-card:hover .play-overlay { opacity: 1; }
    .book-card.playing .play-overlay { opacity: 1; background: rgba(212,130,10,0.5); }
    .play-circle {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: rgba(255,255,255,0.92);
      display: flex; align-items: center; justify-content: center;
    }
    .play-circle svg { fill: var(--brown); width: 18px; height: 18px; }
    .play-circle svg.pause-icon { margin-left: 0; }
    .play-circle svg.play-icon { margin-left: 3px; }

    .book-info {
      padding: .75rem .85rem .9rem;
    }
    .book-title {
      font-family: 'Lora', serif;
      font-size: .88rem;
      font-weight: 600;
      color: var(--brown);
      line-height: 1.35;
    }

    /* ── Loading / Error ── */
    .status-msg {
      text-align: center;
      padding: 3rem 1.5rem;
      color: var(--muted);
    }
    .status-msg .icon { font-size: 2.5rem; margin-bottom: .6rem; }
    .status-msg p { font-family: 'Lora', serif; font-style: italic; font-size: 1rem; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<div class="hero">
  <span class="hero-emoji">📚</span>
  <h1>Papi's Story Library</h1>
  <p>Stories for Ochito read with love</p>
</div>

<div class="container">

  <div class="now-playing" id="now-playing">
    <div class="np-top">
      <img class="np-cover" id="np-cover" src="" alt="" />
      <div class="np-info">
        <div class="np-label">Now playing</div>
        <div class="np-title" id="np-title">—</div>
      </div>
    </div>
    <audio class="np-audio" id="main-audio" controls></audio>
  </div>

  <div id="book-grid" class="book-grid">
    <div class="status-msg"><div class="icon">📖</div><p>Loading stories…</p></div>
  </div>

</div>

<script>
  const audio = document.getElementById('main-audio');
  let currentIdx = null;
  let playlist = [];

  async function loadPlaylist() {
    const grid = document.getElementById('book-grid');
    try {
      const res = await fetch('playlist.json');
      if (!res.ok) throw new Error('not found');
      playlist = await res.json();
      renderGrid();
    } catch(e) {
      grid.innerHTML = `<div class="status-msg"><div class="icon">📖</div><p>No stories yet — Papi will add some soon!</p></div>`;
    }
  }

  function renderGrid() {
    const grid = document.getElementById('book-grid');
    if (!playlist.length) {
      grid.innerHTML = `<div class="status-msg"><div class="icon">📖</div><p>No stories yet — Papi will add some soon!</p></div>`;
      return;
    }
    grid.innerHTML = playlist.map((book, i) => `
      <div class="book-card" id="card-${i}" onclick="playBook(${i})">
        <div class="book-cover-wrap">
          <img src="${esc(book.cover)}" alt="${esc(book.title)}" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';" />
          <div style="display:none;position:absolute;inset:0;align-items:center;justify-content:center;font-size:2.5rem;background:var(--warm);">📖</div>
          <div class="play-overlay">
            <div class="play-circle" id="circle-${i}">
              <svg class="play-icon" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>
            </div>
          </div>
        </div>
        <div class="book-info">
          <div class="book-title">${esc(book.title)}</div>
        </div>
      </div>
    `).join('');
  }

  function playBook(i) {
    const book = playlist[i];
    if (!book) return;

    // reset previous
    if (currentIdx !== null && currentIdx !== i) {
      document.getElementById(`card-${currentIdx}`)?.classList.remove('playing');
      setIcon(currentIdx, 'play');
    }

    if (currentIdx === i && !audio.paused) {
      audio.pause();
      document.getElementById(`card-${i}`)?.classList.remove('playing');
      setIcon(i, 'play');
      currentIdx = null;
      return;
    }

    currentIdx = i;
    audio.src = book.recording;
    audio.play();

    document.getElementById(`card-${i}`)?.classList.add('playing');
    setIcon(i, 'pause');

    // now playing bar
    document.getElementById('np-title').textContent = book.title;
    const npCover = document.getElementById('np-cover');
    npCover.src = book.cover;
    npCover.alt = book.title;
    document.getElementById('now-playing').classList.add('visible');

    audio.onended = () => {
      document.getElementById(`card-${i}`)?.classList.remove('playing');
      setIcon(i, 'play');
      currentIdx = null;
    };
  }

  function setIcon(i, type) {
    const circle = document.getElementById(`circle-${i}`);
    if (!circle) return;
    if (type === 'pause') {
      circle.innerHTML = `<svg class="pause-icon" viewBox="0 0 10 10"><rect x="0" y="0" width="3.5" height="10"/><rect x="6.5" y="0" width="3.5" height="10"/></svg>`;
    } else {
      circle.innerHTML = `<svg class="play-icon" viewBox="0 0 10 12"><polygon points="0,0 10,6 0,12"/></svg>`;
    }
    circle.querySelector('svg').style.fill = 'var(--brown)';
    if (type === 'play') circle.querySelector('svg').style.marginLeft = '3px';
  }

  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  loadPlaylist();
</script>
</body>
</html>
